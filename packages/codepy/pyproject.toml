[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "codepy"
version = "0.1.0"
description = "Pure Python sandbox package using PyVista."
requires-python = ">=3.10"
readme = "README.md"
dependencies = ["pyvista"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
