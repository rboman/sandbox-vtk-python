[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pmanager"
version = "0.1.0"
description = "CLI skeleton for sandbox-vtk-python orchestration."
requires-python = ">=3.10"
readme = "README.md"
dependencies = ["typer>=0.12,<1.0"]

[project.scripts]
pmanager = "pmanager.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
